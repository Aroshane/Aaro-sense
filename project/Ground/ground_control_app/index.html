<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroSense — Ground Control Station (GCS)</title>
    
    <!-- Global Error Interceptor for GCS debugging -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("GLOBAL ERROR CAPTURED:", message, "at", source, ":", lineno, ":", colno);
        if (error && error.stack) {
          console.error(error.stack);
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        console.error("UNHANDLED REJECTION CAPTURED:", event.reason);
        if (event.reason && event.reason.stack) {
          console.error(event.reason.stack);
        }
      });
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet.js CDN (Bulletproof Map layer for React 18/19 compatibility) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
      /* Ensure leaflet container has proper styles and maps look integrated */
      .leaflet-container {
        width: 100%;
        height: 100%;
        background: #0f1225 !important;
      }
      .leaflet-tile {
        filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
      }
      .leaflet-bar a {
        background-color: rgba(22, 28, 54, 0.8) !important;
        color: #ffffff !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
      }
      .leaflet-bar a:hover {
        background-color: rgba(139, 92, 246, 0.4) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
